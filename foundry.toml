[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
script = "scripts"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256
